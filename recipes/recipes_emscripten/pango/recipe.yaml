context:
  name: pango
  version: 1.50.14
  version_majmin: 1.50

package:
  name: pango
  version: ${{ version }}

source:
  url: https://download.gnome.org/sources/pango/${{ version_majmin }}/pango-${{ version }}.tar.xz
  sha256: 1d67f205bfc318c27a29cfdfb6828568df566795df0cb51d2189cde7f2d581e8

build:
  number: 0

requirements:
  build:
    - meson
    - ninja
    - pkg-config
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - gobject-introspection
  host:
    - cairo>=0.18
    - fribidi
    - glib
    - harfbuzz>=8.5
    - fontconfig>=2.12
    - freetype
    - libpng
  run:
    - cairo>=0.18
    - fribidi
    - glib
    - harfbuzz>=8.5
    - fontconfig>=2.12
    - freetype
    - libpng

about:
  homepage: http://www.pango.org/
  license: LGPL-2.1-or-later
  license_file: COPYING
  summary: Text layout and rendering engine.
  description: |
    Pango is a library for laying out and rendering of text, with an emphasis
    on internationalization. Pango can be used anywhere that text layout is
    needed, though most of the work on Pango so far has been done in the
    context of the GTK+ widget toolkit. Pango forms the core of text and font
    handling for GTK+-2.x.
  documentation: http://www.pango.org/
  repository: https://gitlab.gnome.org/GNOME/pango

extra:
  recipe-maintainers:
    - IsabelParedes